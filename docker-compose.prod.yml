services:
  # Base de données PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: postgres_db_prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-appdb}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - api-db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API FastAPI (depuis DockerHub)
  api:
    image: ${DOCKERHUB_USERNAME}/app-api:latest
    container_name: fastapi_api_prod
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DB_TYPE: postgresql
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-appdb}
      ENVIRONMENT: production
    depends_on:
      db:
        condition: service_healthy
    networks:
      - front-api
      - api-db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend Streamlit (depuis DockerHub)
  front:
    image: ${DOCKERHUB_USERNAME}/app-front:latest
    container_name: streamlit_front_prod
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      API_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    networks:
      - front-api

# Réseaux
networks:
  front-api:
    driver: bridge
    name: front-api-prod
  api-db:
    driver: bridge
    name: api-db-prod

# Volumes
volumes:
  postgres_data_prod:
    driver: local
    name: postgres_data_prod
