name: CD - Continuous Delivery

on:
  workflow_run:
    workflows: ["CI Standardisation Projet 2"]
    types:
      - completed
    branches:
      - main

jobs:
  check-ci:
    name: Vérifier le statut de la CI
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    steps:
    - name: CI Success
      run: echo "✅ CI passée avec succès, démarrage du CD"

  docker-push:
    name: Build et Push vers DockerHub
    runs-on: ubuntu-latest
    needs: check-ci
    
    steps:
    - name: Checkout du code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login vers DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    
    - name: Extraire les métadonnées (tags, labels) pour l'API
      id: meta-api
      uses: docker/metadata-action@v5
      with:
        images: ${{ secrets.DOCKERHUB_USERNAME }}/app-api
        tags: |
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}
    
    - name: Build et Push de l'API
      uses: docker/build-push-action@v5
      with:
        context: ./app_api
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/app-api:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/app-api:${{ github.sha }}
        labels: ${{ steps.meta-api.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    - name: Extraire les métadonnées (tags, labels) pour le Frontend
      id: meta-front
      uses: docker/metadata-action@v5
      with:
        images: ${{ secrets.DOCKERHUB_USERNAME }}/app-front
        tags: |
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}
    
    - name: Build et Push du Frontend
      uses: docker/build-push-action@v5
      with:
        context: ./app_front
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/app-front:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/app-front:${{ github.sha }}
        labels: ${{ steps.meta-front.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    - name: Résumé du déploiement
      run: |
        echo "🎉 Images Docker publiées avec succès !"
        echo "📦 API: ${{ secrets.DOCKERHUB_USERNAME }}/app-api:latest"
        echo "📦 API: ${{ secrets.DOCKERHUB_USERNAME }}/app-api:${{ github.sha }}"
        echo "📦 Frontend: ${{ secrets.DOCKERHUB_USERNAME }}/app-front:latest"
        echo "📦 Frontend: ${{ secrets.DOCKERHUB_USERNAME }}/app-front:${{ github.sha }}"

  deploy-notification:
    name: Notification de déploiement
    runs-on: ubuntu-latest
    needs: docker-push
    if: success()
    
    steps:
    - name: Succès du déploiement
      run: |
        echo "✅ Déploiement réussi !"
        echo "Les images sont disponibles sur DockerHub"
        echo "Vous pouvez maintenant utiliser docker-compose.prod.yml"
